name: Release
on:
  push:
    tags:
      - "v*"
jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0
      - run: bun install --frozen-lockfile
      - run: bun run --filter=@evodactyl/db generate
      - run: bun run typecheck
      - run: bun run --filter=@evodactyl/web build:production
      - name: create release branch and bump version
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          BRANCH=release/${{ env.VERSION }}
          git config --local user.email 'ci@evodactyl.dev'
          git config --local user.name 'Evodactyl CI'
          git checkout -b "$BRANCH"
          git push -u origin "$BRANCH"
          # Bump the version literal in apps/api/src/config/index.ts.
          # Ships as `version: 'canary'` on main; release tags rewrite it to the tag
          # (stripped of the leading `v`).
          sed -i "s/version: 'canary'/version: '${VERSION:1}'/" apps/api/src/config/index.ts
          git add apps/api/src/config/index.ts
          git commit -m 'ci(release): bump version'
          git push
      - name: create release archive
        run: |
          rm -rf node_modules
          tar -czf panel.tar.gz * .editorconfig .env.example .gitignore
      - uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: |
            panel.tar.gz
