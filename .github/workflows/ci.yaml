name: Tests

on:
  pull_request:
    branches:
      - "main"
  push:
    branches:
      - "main"

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run --filter=@evodactyl/db generate

      - name: Typecheck
        run: bun run typecheck

  api-tests:
    name: API unit tests
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    services:
      database:
        image: mariadb:11
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: testing
          MYSQL_USER: evodactyl
          MYSQL_PASSWORD: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    env:
      # Deterministic test key — not a secret, only used for unit-test encryption roundtrips.
      APP_KEY: "base64:dGVzdGluZ190ZXN0aW5nX3Rlc3RpbmdfdGVzdGluZw=="
      APP_ENV: testing
      APP_URL: http://localhost:3000
      DATABASE_URL: "mysql://evodactyl:testing@127.0.0.1:3306/testing"
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      DB_DATABASE: testing
      DB_USERNAME: evodactyl
      DB_PASSWORD: testing
      SESSION_DRIVER: memory
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run --filter=@evodactyl/db generate

      - name: Apply migrations
        run: bun run --filter=@evodactyl/db migrate

      - name: Run api unit tests
        run: bun run --filter=@evodactyl/api test
