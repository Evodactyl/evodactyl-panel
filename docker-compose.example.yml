x-common:
  database:
    &db-environment
    MYSQL_PASSWORD: &db-password "CHANGE_ME"
    MYSQL_ROOT_PASSWORD: "CHANGE_ME_TOO"
  panel:
    &panel-environment
    APP_URL: "http://example.com"
    APP_TIMEZONE: "UTC"
    APP_SERVICE_AUTHOR: "noreply@example.com"
  mail:
    &mail-environment
    MAIL_FROM_ADDRESS: "noreply@example.com"
    MAIL_HOST: "mail"
    MAIL_PORT: "1025"
    MAIL_USERNAME: ""
    MAIL_PASSWORD: ""
    MAIL_ENCRYPTION: "tls"

services:
  database:
    image: mariadb:11
    restart: always
    volumes:
      - "/srv/evodactyl/database:/var/lib/mysql"
    environment:
      <<: *db-environment
      MYSQL_DATABASE: "panel"
      MYSQL_USER: "evodactyl"

  cache:
    image: redis:7-alpine
    restart: always

  panel:
    # Evodactyl builds its own image from the source checkout — we do not publish
    # a pre-built image. Run `docker compose up -d --build` from inside the
    # cloned repo. The build takes a few minutes on first run (bun install +
    # prisma generate + vite build) and is cached on subsequent runs.
    build:
      context: .
      dockerfile: Dockerfile
    image: evodactyl/panel:local
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - database
      - cache
    environment:
      <<: [*panel-environment, *mail-environment]
      APP_ENV: "production"
      DB_HOST: "database"
      DB_PORT: "3306"
      DB_DATABASE: "panel"
      DB_USERNAME: "evodactyl"
      DB_PASSWORD: *db-password
      DATABASE_URL: "mysql://evodactyl:CHANGE_ME@database:3306/panel"
      REDIS_HOST: "cache"
      SESSION_DRIVER: "redis"
      # APP_KEY must be generated once and preserved. Either let the panel's
      # environment:setup CLI generate one, or run openssl on the host:
      #     openssl rand -base64 32
      # and prefix with "base64:".
      APP_KEY: "base64:REPLACE_ME_WITH_A_GENERATED_KEY"
      HASHIDS_LENGTH: 8

networks:
  default:
    ipam:
      config:
        - subnet: 172.20.0.0/16
